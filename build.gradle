plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

configurations {
    bundledLibraries
    implementation.extendsFrom bundledLibraries
}

repositories {
    maven { name = 'NeoForged'; url = 'https://maven.neoforged.net/releases' }
    maven { name = 'MinecraftLibraries'; url = 'https://libraries.minecraft.net/' }
    mavenCentral()
}

neoForge {
    version = project.neoforge_version

    runs {
        client {
            client()
            jvmArguments = ['--add-reads=friendlink=ALL-UNNAMED']
        }
        server {
            server()
        }
    }

    mods {
        friendlink {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    bundledLibraries "dev.onvoid.webrtc:webrtc-java:${project.webrtc_version}"
    bundledLibraries "dev.onvoid.webrtc:webrtc-java:${project.webrtc_version}:windows-x86_64"

    // NeoForge 1.21.1 dev runs do not automatically expose non-Minecraft libraries.
    additionalRuntimeClasspath "dev.onvoid.webrtc:webrtc-java:${project.webrtc_version}"
    additionalRuntimeClasspath "dev.onvoid.webrtc:webrtc-java:${project.webrtc_version}:windows-x86_64"
}

processResources {
    inputs.property 'version', project.version
    filesMatching('META-INF/neoforge.mods.toml') {
        expand 'version': project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

tasks.named('jar', Jar).configure {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from({
        configurations.bundledLibraries.collect { dependency ->
            dependency.isDirectory() ? dependency : zipTree(dependency)
        }
    }) {
        exclude 'META-INF/MANIFEST.MF'
        exclude 'META-INF/*.SF'
        exclude 'META-INF/*.DSA'
        exclude 'META-INF/*.RSA'
    }
}
